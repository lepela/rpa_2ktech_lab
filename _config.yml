title: PA/PAD 교육 사이트
description: >-
  Power Automate / Power Automate Desktop 교육 사이트.
  코딩 경험 없는 시티즌 개발자를 위한 하루 완성 과정.
baseurl: "/rpa_2ktech_lab"
url: "https://github.com/lepela"


# Build settings
# theme: just-the-docs
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-feed

# Just the Docs 설정
search_enabled: true
search:
  heading_level: 2
  previews: 3

aux_links:
  "Microsoft Learn PAD":
    - "https://learn.microsoft.com/ko-kr/power-automate/desktop-flows/introduction"

# 컬렉션 순서
nav_sort: order

# 색상 테마
color_scheme: light

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
